<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QoderOpenAPI Gateway Console</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #1a1a2e;
  --card: #16213e;
  --accent: #0f3460;
  --accent-light: #1a4a8a;
  --text: #e0e0e0;
  --text-dim: #8892a4;
  --border: #2a2a4a;
  --user-bg: #2563eb;
  --assistant-bg: #1e293b;
  --error-bg: #7f1d1d;
  --thinking-bg: #312e81;
  --thinking-border: #6366f1;
  --tool-bg: #1e3a5f;
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --radius: 8px;
  --sidebar-width: 260px;
  --right-sidebar-width: 320px;
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  height: 44px;
}
.header-title {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-title svg { flex-shrink: 0; }
.status-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--text-dim);
  display: inline-block;
  transition: background 0.3s;
}
.status-dot.ok { background: var(--success); }
.status-dot.err { background: var(--danger); }
.header-actions { display: flex; gap: 8px; }
.header-actions button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 4px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  transition: all 0.2s;
}
.header-actions button:hover { color: var(--text); border-color: var(--text-dim); }

/* Main layout */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* Left sidebar - Sessions + Settings */
.left-sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.left-sidebar::-webkit-scrollbar { width: 4px; }
.left-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Session list section */
.session-section {
  flex-shrink: 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  max-height: 45%;
}
.session-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  flex-shrink: 0;
}
.session-header h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 600;
}
.btn-new-session {
  background: var(--accent-light);
  color: #fff;
  border: none;
  padding: 3px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  transition: opacity 0.2s;
}
.btn-new-session:hover { opacity: 0.85; }

.session-list {
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.session-list::-webkit-scrollbar { width: 3px; }
.session-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.session-item {
  display: flex;
  align-items: center;
  padding: 7px 12px;
  cursor: pointer;
  transition: background 0.15s;
  gap: 6px;
  position: relative;
}
.session-item:hover { background: rgba(255,255,255,0.04); }
.session-item.active { background: var(--accent); }
.session-item-icon {
  font-size: 14px;
  flex-shrink: 0;
  opacity: 0.6;
}
.session-item-info {
  flex: 1;
  min-width: 0;
}
.session-item-title {
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.3;
}
.session-item-meta {
  font-size: 10px;
  color: var(--text-dim);
  display: flex;
  gap: 6px;
}
.session-item-actions {
  display: none;
  gap: 2px;
  flex-shrink: 0;
}
.session-item:hover .session-item-actions { display: flex; }
.session-item-actions button {
  background: transparent;
  border: none;
  color: var(--text-dim);
  cursor: pointer;
  padding: 2px 4px;
  font-size: 12px;
  border-radius: 3px;
  line-height: 1;
}
.session-item-actions button:hover { color: var(--text); background: rgba(255,255,255,0.1); }
.session-item-actions button.btn-del:hover { color: var(--danger); }

/* Settings section */
.settings-section {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0;
}
.settings-section::-webkit-scrollbar { width: 4px; }
.settings-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.setting-group { display: flex; flex-direction: column; gap: 4px; }
.setting-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-dim);
  font-weight: 600;
}
.setting-group select,
.setting-group input[type="text"],
.setting-group input[type="number"],
.setting-group textarea {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 8px;
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.setting-group select:focus,
.setting-group input:focus,
.setting-group textarea:focus { border-color: var(--accent-light); }
.setting-group textarea { resize: vertical; min-height: 60px; }
.setting-group select { cursor: pointer; }

/* Toggle switch */
.toggle-row { display: flex; align-items: center; justify-content: space-between; }
.toggle {
  position: relative;
  width: 40px;
  height: 22px;
  cursor: pointer;
}
.toggle input { display: none; }
.toggle-track {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 11px;
  transition: background 0.2s;
}
.toggle input:checked + .toggle-track { background: var(--accent-light); }
.toggle-thumb {
  position: absolute;
  top: 2px;
  left: 2px;
  width: 18px;
  height: 18px;
  background: var(--text);
  border-radius: 50%;
  transition: transform 0.2s;
  pointer-events: none;
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(18px); }

/* Slider */
.slider-row { display: flex; align-items: center; gap: 8px; }
.slider-row input[type="range"] {
  flex: 1;
  -webkit-appearance: none;
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  outline: none;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 14px;
  background: var(--accent-light);
  border-radius: 50%;
  cursor: pointer;
}
.slider-value {
  font-size: 12px;
  color: var(--text-dim);
  min-width: 28px;
  text-align: right;
}

.btn-reset {
  background: var(--danger);
  color: #fff;
  border: none;
  padding: 6px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  transition: opacity 0.2s;
}
.btn-reset:hover { opacity: 0.85; }

/* Chat area */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  overflow: hidden;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Message bubbles */
.msg {
  max-width: 80%;
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  word-wrap: break-word;
  overflow-wrap: break-word;
  animation: msgIn 0.2s ease-out;
}
@keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg-user {
  align-self: flex-end;
  background: var(--user-bg);
  border-bottom-right-radius: 4px;
}
.msg-assistant {
  align-self: flex-start;
  background: var(--assistant-bg);
  border-bottom-left-radius: 4px;
}
.msg-error {
  align-self: center;
  background: var(--error-bg);
  max-width: 90%;
  text-align: center;
}

/* Thinking section */
.thinking-section {
  margin-bottom: 6px;
  border: 1px solid var(--thinking-border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--thinking-bg);
}
.thinking-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
  color: #a5b4fc;
  user-select: none;
}
.thinking-header:hover { background: rgba(99,102,241,0.15); }
.thinking-arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-size: 10px;
}
.thinking-arrow.open { transform: rotate(90deg); }
.thinking-spinner {
  width: 12px; height: 12px;
  border: 2px solid rgba(165,180,252,0.3);
  border-top-color: #a5b4fc;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.thinking-body {
  padding: 8px 10px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  color: #c4b5fd;
  white-space: pre-wrap;
  max-height: 300px;
  overflow-y: auto;
  display: none;
}
.thinking-body.open { display: block; }

/* Tool use card */
.tool-card {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  background: var(--tool-bg);
  border: 1px solid var(--warning);
  border-radius: 6px;
  font-size: 12px;
  color: var(--warning);
  margin-bottom: 4px;
}
.tool-icon { font-size: 14px; }

/* Workflow tool use card */
.workflow-tooluse-card {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 8px 12px;
  background: rgba(245, 158, 11, 0.1);
  border: 1px solid rgba(245, 158, 11, 0.3);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 13px;
}
.workflow-tooluse-header {
  display: flex;
  align-items: center;
  gap: 6px;
  color: rgba(245, 158, 11, 0.9);
  font-weight: 600;
}
.workflow-tooluse-input {
  color: var(--text-dim);
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 100px;
  overflow-y: auto;
  padding: 4px 0;
}

/* Workflow tool result card */
.workflow-toolresult-card {
  display: flex;
  flex-direction: column;
  gap: 4px;
  border: 1px solid rgba(34, 197, 94, 0.3);
  border-radius: 8px;
  margin-bottom: 6px;
  overflow: hidden;
  background: rgba(34, 197, 94, 0.05);
}
.workflow-toolresult-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 12px;
  cursor: pointer;
  color: rgba(34, 197, 94, 0.9);
  font-size: 12px;
  font-weight: 600;
  user-select: none;
}
.workflow-toolresult-header:hover { background: rgba(34, 197, 94, 0.1); }
.workflow-toolresult-arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-size: 10px;
}
.workflow-toolresult-arrow.open { transform: rotate(90deg); }
.workflow-toolresult-body {
  padding: 8px 12px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 12px;
  color: var(--text-dim);
  white-space: pre-wrap;
  max-height: 200px;
  overflow-y: auto;
  display: none;
}
.workflow-toolresult-body.open { display: block; }
.workflow-toolresult-error { color: var(--danger); }

/* Streaming cursor */
.streaming-cursor::after {
  content: '';
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--text);
  margin-left: 2px;
  animation: blink 0.8s step-end infinite;
  vertical-align: text-bottom;
}
@keyframes blink { 50% { opacity: 0; } }

/* Markdown in messages */
.msg h1, .msg h2, .msg h3 { margin: 8px 0 4px; }
.msg h1 { font-size: 18px; }
.msg h2 { font-size: 16px; }
.msg h3 { font-size: 14px; }
.msg p { margin: 4px 0; }
.msg ul, .msg ol { padding-left: 20px; margin: 4px 0; }
.msg code {
  background: rgba(0,0,0,0.3);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  font-size: 13px;
}
.msg pre {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  overflow-x: auto;
  margin: 6px 0;
}
.msg pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.5;
}
.msg strong { font-weight: 700; }
.msg em { font-style: italic; }
.msg blockquote {
  border-left: 3px solid var(--accent-light);
  padding-left: 10px;
  margin: 6px 0;
  color: var(--text-dim);
}

/* Input area */
.input-area {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  background: var(--card);
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.input-row textarea {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: var(--radius);
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 40px;
  max-height: 160px;
  outline: none;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.input-row textarea:focus { border-color: var(--accent-light); }
.input-btns { display: flex; gap: 6px; flex-shrink: 0; }
.btn {
  padding: 8px 14px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-send { background: var(--accent-light); color: #fff; }
.btn-send:hover { background: #2563eb; }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-stop { background: var(--danger); color: #fff; }
.btn-stop:hover { opacity: 0.85; }
.btn-clear { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-clear:hover { color: var(--text); border-color: var(--text-dim); }

/* Right sidebar */
.right-sidebar {
  width: var(--right-sidebar-width);
  flex-shrink: 0;
  background: var(--card);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: width 0.3s, opacity 0.3s;
}
.right-sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; }
.right-sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.right-sidebar-header h3 { font-size: 13px; font-weight: 600; }
.right-sidebar-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.right-sidebar-body::-webkit-scrollbar { width: 4px; }
.right-sidebar-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Log entries */
.log-entry {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.log-entry:hover { border-color: var(--accent-light); }
.log-meta {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 4px;
}
.log-model { font-weight: 600; color: var(--text); }
.log-status {
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
}
.log-status.ok { background: rgba(34,197,94,0.15); color: var(--success); }
.log-status.err { background: rgba(239,68,68,0.15); color: var(--danger); }
.log-preview {
  font-size: 12px;
  color: var(--text-dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.log-detail {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--border);
  display: none;
}
.log-detail.open { display: block; }
.log-detail pre {
  background: #0d1117;
  padding: 8px;
  border-radius: 4px;
  font-size: 11px;
  overflow-x: auto;
  white-space: pre-wrap;
  word-break: break-all;
  max-height: 300px;
  overflow-y: auto;
  color: var(--text-dim);
  font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
}

/* Empty state */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--text-dim);
  font-size: 13px;
  gap: 8px;
}
.empty-state svg { opacity: 0.3; }

/* Rename input */
.rename-input {
  background: var(--bg);
  border: 1px solid var(--accent-light);
  color: var(--text);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  width: 100%;
}

/* Responsive */
@media (max-width: 900px) {
  .right-sidebar { position: absolute; right: 0; top: 44px; bottom: 0; z-index: 10; box-shadow: -4px 0 20px rgba(0,0,0,0.4); }
  .right-sidebar.collapsed { width: 0; }
}
@media (max-width: 700px) {
  .left-sidebar { width: 220px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-title">
    <svg width="20" height="20" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="#0f3460"/><text x="32" y="42" text-anchor="middle" font-size="36" font-weight="700" fill="#e0e0e0">Q</text></svg>
    QoderOpenAPI Gateway
    <span class="status-dot" id="statusDot" title="Disconnected"></span>
  </div>
  <div class="header-actions">
    <button id="btnToggleLogs" title="Toggle logs panel">Logs</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Left Sidebar: Sessions + Settings -->
  <div class="left-sidebar">
    <!-- Session list -->
    <div class="session-section">
      <div class="session-header">
        <h3>Sessions</h3>
        <button class="btn-new-session" id="btnNewSession" title="New chat session">+ New</button>
      </div>
      <div class="session-list" id="sessionList">
        <div class="empty-state" style="padding:16px;font-size:12px;"><span>No sessions</span></div>
      </div>
    </div>

    <!-- Settings -->
    <div class="settings-section">
      <div class="setting-group">
        <label class="setting-label">Model</label>
        <select id="selModel"><option value="">Loading...</option></select>
      </div>

      <div class="setting-group">
        <div class="toggle-row">
          <label class="setting-label">Streaming</label>
          <label class="toggle">
            <input type="checkbox" id="chkStream" checked>
            <span class="toggle-track"></span>
            <span class="toggle-thumb"></span>
          </label>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Max Tokens</label>
        <input type="number" id="numMaxTokens" value="4096" min="1" max="128000">
      </div>

      <div class="setting-group">
        <label class="setting-label">Temperature</label>
        <div class="slider-row">
          <input type="range" id="sldTemp" min="0" max="2" step="0.1" value="1">
          <span class="slider-value" id="tempValue">1.0</span>
        </div>
      </div>

      <div class="setting-group">
        <label class="setting-label">Max Turns</label>
        <input type="number" id="numMaxTurns" value="1" min="1" max="100">
      </div>

      <div class="setting-group">
        <label class="setting-label">System Prompt</label>
        <textarea id="txtSystem" rows="3" placeholder="Optional system prompt..."></textarea>
      </div>

      <div class="setting-group">
        <label class="setting-label">Transport Mode</label>
        <select id="selTransport">
          <option value="auto">Auto</option>
          <option value="pipe">Pipe</option>
          <option value="subprocess">Subprocess</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label">API Key</label>
        <input type="text" id="txtApiKey" placeholder="Optional...">
      </div>

      <button class="btn-reset" id="btnReset">Reset Settings</button>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        <span>Send a message to start chatting</span>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="inputMsg" rows="1" placeholder="Type a message... (Shift+Enter for newline)"></textarea>
        <div class="input-btns">
          <button class="btn btn-send" id="btnSend" title="Send">&#9654; Send</button>
          <button class="btn btn-stop" id="btnStop" style="display:none" title="Stop">&#9632; Stop</button>
          <button class="btn btn-clear" id="btnClearChat" title="Clear chat">&#10005;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Sidebar: Logs -->
  <div class="right-sidebar collapsed" id="rightSidebar">
    <div class="right-sidebar-header">
      <h3>Message Logs</h3>
      <button class="btn btn-clear" id="btnClearLogs" style="font-size:11px;padding:3px 8px;">Clear</button>
    </div>
    <div class="right-sidebar-body" id="logsBody">
      <div class="empty-state"><span>No logs yet</span></div>
    </div>
  </div>

</div>

<script>
// ==================== State ====================
const API_BASE = location.origin;
let chatMessages = []; // { role, content } for API
let isStreaming = false;
let abortController = null;
let currentAssistantEl = null;
let currentThinkingEl = null;
let currentContentEl = null;
let thinkingOpen = false;
let thinkingText = '';
let contentText = '';
let toolCalls = [];
let logsRefreshTimer = null;

// Session state
let currentSessionId = null;
let sessionList = [];

// ==================== DOM refs ====================
const $ = id => document.getElementById(id);
const selModel = $('selModel');
const chkStream = $('chkStream');
const numMaxTokens = $('numMaxTokens');
const sldTemp = $('sldTemp');
const tempValue = $('tempValue');
const numMaxTurns = $('numMaxTurns');
const txtSystem = $('txtSystem');
const selTransport = $('selTransport');
const txtApiKey = $('txtApiKey');
const btnReset = $('btnReset');
const messagesEl = $('messages');
const emptyState = $('emptyState');
const inputMsg = $('inputMsg');
const btnSend = $('btnSend');
const btnStop = $('btnStop');
const btnClearChat = $('btnClearChat');
const statusDot = $('statusDot');
const btnToggleLogs = $('btnToggleLogs');
const rightSidebar = $('rightSidebar');
const logsBody = $('logsBody');
const btnClearLogs = $('btnClearLogs');
const sessionListEl = $('sessionList');
const btnNewSession = $('btnNewSession');

// ==================== Init ====================
async function init() {
  await fetchModels();
  await checkStatus();
  await loadSessions();
  setupEvents();
  startLogsRefresh();
}

async function fetchModels() {
  try {
    const res = await fetch(`${API_BASE}/v1/models`);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    selModel.innerHTML = '';
    if (data.data && data.data.length) {
      data.data.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = m.id;
        selModel.appendChild(opt);
      });
      const defaultModel = 'qmodel_latest';
      if (data.data.some(m => m.id === defaultModel)) {
        selModel.value = defaultModel;
      }
    } else {
      selModel.innerHTML = '<option value="">No models</option>';
    }
  } catch (e) {
    selModel.innerHTML = '<option value="">Failed to load</option>';
    console.error('Failed to fetch models:', e);
  }
}

async function checkStatus() {
  try {
    const res = await fetch(`${API_BASE}/status`);
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    statusDot.className = 'status-dot ok';
    statusDot.title = `Connected - SDK: ${data.sdkConfigured ? 'OK' : 'Not configured'}`;
  } catch {
    statusDot.className = 'status-dot err';
    statusDot.title = 'Disconnected';
  }
}

// ==================== Session Management ====================
async function loadSessions() {
  try {
    const res = await fetch(`${API_BASE}/api/sessions`);
    if (!res.ok) return;
    const data = await res.json();
    sessionList = data.sessions || [];
    renderSessionList();

    // Auto-select the most recent session, or create one if none exist
    if (sessionList.length > 0) {
      await switchToSession(sessionList[0].id);
    } else {
      await createNewSession();
    }
  } catch (e) {
    console.error('Failed to load sessions:', e);
  }
}

function renderSessionList() {
  sessionListEl.innerHTML = '';
  if (sessionList.length === 0) {
    sessionListEl.innerHTML = '<div class="empty-state" style="padding:16px;font-size:12px;"><span>No sessions</span></div>';
    return;
  }

  sessionList.forEach(s => {
    const item = document.createElement('div');
    item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    item.dataset.id = s.id;

    const ts = s.updatedAt ? new Date(s.updatedAt).toLocaleString('zh-CN', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
    const msgCount = s.messageCount || 0;

    item.innerHTML = `
      <span class="session-item-icon">${msgCount > 0 ? '&#128172;' : '&#128466;'}</span>
      <div class="session-item-info">
        <div class="session-item-title">${escapeHtml(s.title || 'New Chat')}</div>
        <div class="session-item-meta"><span>${ts}</span><span>${msgCount} msgs</span></div>
      </div>
      <div class="session-item-actions">
        <button class="btn-rename" title="Rename">&#9998;</button>
        <button class="btn-del" title="Delete">&#10005;</button>
      </div>
    `;

    // Click to switch
    item.addEventListener('click', (e) => {
      if (e.target.closest('.session-item-actions')) return;
      switchToSession(s.id);
    });

    // Rename
    item.querySelector('.btn-rename').addEventListener('click', (e) => {
      e.stopPropagation();
      startRename(s.id, item);
    });

    // Delete
    item.querySelector('.btn-del').addEventListener('click', async (e) => {
      e.stopPropagation();
      if (confirm('Delete this session?')) {
        await deleteSession(s.id);
      }
    });

    sessionListEl.appendChild(item);
  });
}

async function createNewSession() {
  try {
    const res = await fetch(`${API_BASE}/api/sessions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: selModel.value || 'qmodel_latest' }),
    });
    if (!res.ok) return;
    const session = await res.json();
    sessionList.unshift({
      id: session.id,
      title: session.title,
      model: session.model,
      messageCount: 0,
      createdAt: session.createdAt,
      updatedAt: session.updatedAt,
    });
    await switchToSession(session.id);
    renderSessionList();
  } catch (e) {
    console.error('Failed to create session:', e);
  }
}

async function switchToSession(sessionId) {
  if (sessionId === currentSessionId) return;

  try {
    const res = await fetch(`${API_BASE}/api/sessions/${sessionId}`);
    if (!res.ok) return;
    const session = await res.json();

    currentSessionId = sessionId;
    chatMessages = session.messages || [];

    // Update model selector
    if (session.model) {
      selModel.value = session.model;
    }

    // Re-render chat messages
    renderChatMessages();
    renderSessionList();
  } catch (e) {
    console.error('Failed to switch session:', e);
  }
}

function renderChatMessages() {
  messagesEl.innerHTML = '';

  if (chatMessages.length === 0) {
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
    return;
  }

  emptyState.style.display = 'none';

  chatMessages.forEach(msg => {
    if (msg.role === 'user') {
      addUserBubble(msg.content, false);
    } else if (msg.role === 'assistant') {
      addAssistantBubble(msg.content, false);
    }
  });

  scrollToBottom();
}

function addUserBubble(text, saveToSession = true) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg msg-user';
  div.textContent = text;
  messagesEl.appendChild(div);
  scrollToBottom();
}

function addAssistantBubble(text, saveToSession = true) {
  emptyState.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'msg msg-assistant';
  const contentDiv = document.createElement('div');
  contentDiv.className = 'msg-content';
  contentDiv.innerHTML = renderMarkdown(text);
  div.appendChild(contentDiv);
  messagesEl.appendChild(div);
  scrollToBottom();
}

async function deleteSession(sessionId) {
  try {
    await fetch(`${API_BASE}/api/sessions/${sessionId}`, { method: 'DELETE' });
    sessionList = sessionList.filter(s => s.id !== sessionId);

    if (sessionId === currentSessionId) {
      currentSessionId = null;
      chatMessages = [];
      if (sessionList.length > 0) {
        await switchToSession(sessionList[0].id);
      } else {
        await createNewSession();
      }
    }
    renderSessionList();
  } catch (e) {
    console.error('Failed to delete session:', e);
  }
}

function startRename(sessionId, itemEl) {
  const titleEl = itemEl.querySelector('.session-item-title');
  const oldTitle = titleEl.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'rename-input';
  input.value = oldTitle;
  titleEl.replaceWith(input);
  input.focus();
  input.select();

  const finish = async () => {
    const newTitle = input.value.trim() || oldTitle;
    try {
      await fetch(`${API_BASE}/api/sessions/${sessionId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: newTitle }),
      });
      // Update local data
      const s = sessionList.find(s => s.id === sessionId);
      if (s) s.title = newTitle;
    } catch {}
    renderSessionList();
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = oldTitle; input.blur(); }
  });
}

// ==================== Events ====================
function setupEvents() {
  sldTemp.addEventListener('input', () => {
    tempValue.textContent = parseFloat(sldTemp.value).toFixed(1);
  });

  btnReset.addEventListener('click', () => {
    selModel.value = 'qmodel_latest';
    chkStream.checked = true;
    numMaxTokens.value = 4096;
    sldTemp.value = 1;
    tempValue.textContent = '1.0';
    numMaxTurns.value = 1;
    txtSystem.value = '';
    selTransport.value = 'auto';
    txtApiKey.value = '';
  });

  inputMsg.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputMsg.addEventListener('input', autoResize);

  btnSend.addEventListener('click', sendMessage);
  btnStop.addEventListener('click', stopStreaming);
  btnClearChat.addEventListener('click', () => {
    if (currentSessionId) {
      // Clear messages in current session
      chatMessages = [];
      messagesEl.innerHTML = '';
      messagesEl.appendChild(emptyState);
      emptyState.style.display = '';
      // Update session on server
      fetch(`${API_BASE}/api/sessions/${currentSessionId}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [] }),
      });
    }
  });

  btnToggleLogs.addEventListener('click', () => {
    rightSidebar.classList.toggle('collapsed');
  });

  btnClearLogs.addEventListener('click', clearLogs);

  btnNewSession.addEventListener('click', createNewSession);
}

function autoResize() {
  inputMsg.style.height = 'auto';
  inputMsg.style.height = Math.min(inputMsg.scrollHeight, 160) + 'px';
}

// ==================== Chat ====================
function createAssistantBubble() {
  emptyState.style.display = 'none';
  const wrapper = document.createElement('div');
  wrapper.className = 'msg msg-assistant';
  wrapper.innerHTML = '';
  messagesEl.appendChild(wrapper);
  scrollToBottom();
  return wrapper;
}

function createThinkingSection(parent) {
  const sec = document.createElement('div');
  sec.className = 'thinking-section';

  const header = document.createElement('div');
  header.className = 'thinking-header';
  header.innerHTML = '<span class="thinking-arrow">&#9654;</span> <span class="thinking-label">Thinking...</span> <span class="thinking-spinner"></span>';

  const body = document.createElement('div');
  body.className = 'thinking-body';

  header.addEventListener('click', () => {
    const arrow = header.querySelector('.thinking-arrow');
    const isOpen = body.classList.toggle('open');
    arrow.classList.toggle('open', isOpen);
  });

  sec.appendChild(header);
  sec.appendChild(body);
  parent.appendChild(sec);
  return { sec, header, body };
}

function createToolCard(parent, toolName) {
  const card = document.createElement('div');
  card.className = 'tool-card';
  card.innerHTML = '<span class="tool-icon">&#128295;</span> ' + escapeHtml(toolName);
  parent.appendChild(card);
  return card;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });
}

async function sendMessage() {
  const text = inputMsg.value.trim();
  if (!text || isStreaming) return;

  inputMsg.value = '';
  inputMsg.style.height = 'auto';

  // Ensure we have a session
  if (!currentSessionId) {
    await createNewSession();
  }

  // Build messages array
  chatMessages.push({ role: 'user', content: text });
  addUserBubble(text, false);

  // Save user message to session
  fetch(`${API_BASE}/api/sessions/${currentSessionId}/messages`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ role: 'user', content: text }),
  });

  // Prepare API request
  const apiMessages = [];
  const sysPrompt = txtSystem.value.trim();
  if (sysPrompt) apiMessages.push({ role: 'system', content: sysPrompt });
  apiMessages.push(...chatMessages);

  const body = {
    model: selModel.value,
    messages: apiMessages,
    stream: chkStream.checked,
    max_tokens: parseInt(numMaxTokens.value) || 4096,
    temperature: parseFloat(sldTemp.value),
    max_turns: parseInt(numMaxTurns.value) || 1,
  };

  const headers = { 'Content-Type': 'application/json' };
  const apiKey = txtApiKey.value.trim();
  if (apiKey) headers['Authorization'] = `Bearer ${apiKey}`;

  isStreaming = true;
  btnSend.style.display = 'none';
  btnStop.style.display = '';
  abortController = new AbortController();

  currentAssistantEl = createAssistantBubble();
  thinkingText = '';
  contentText = '';
  toolCalls = [];
  currentThinkingEl = null;
  currentContentEl = null;
  thinkingOpen = false;

  try {
    if (chkStream.checked) {
      await streamChat(body, headers);
    } else {
      await nonStreamChat(body, headers);
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      addErrorBubble(e.message || 'Request failed');
    }
  } finally {
    finishStreaming();
  }
}

async function streamChat(body, headers) {
  const res = await fetch(`${API_BASE}/v1/chat/completions`, {
    method: 'POST',
    headers,
    body: JSON.stringify(body),
    signal: abortController.signal,
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: { message: res.statusText } }));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed || !trimmed.startsWith('data: ')) continue;
      const data = trimmed.slice(6);
      if (data === '[DONE]') return;

      try {
        const chunk = JSON.parse(data);
        handleChunk(chunk);
      } catch {}
    }
  }
}

function handleChunk(chunk) {
  if (chunk.object !== 'chat.completion.chunk') return;
  const choice = chunk.choices?.[0];
  if (!choice) return;

  const delta = choice.delta;
  if (!delta) return;

  // Check for thinking content
  if (delta.content && delta.content.startsWith('<<thinking>>')) {
    const text = delta.content.replace('<<thinking>>', '').replace('<</thinking>>', '');
    appendThinking(text);
    return;
  }
  if (delta.content && delta.content.includes('<</thinking>>')) {
    const text = delta.content.replace('<</thinking>>', '');
    if (text) appendThinking(text);
    finishThinking();
    return;
  }

  // Check for _qoder_type
  if (chunk._qoder_type === 'thinking' && delta.content) {
    appendThinking(delta.content);
    return;
  }
  if (chunk._qoder_type === 'tool_use') {
    const toolName = chunk._qoder_tool_name || '';
    const toolInput = chunk._qoder_tool_input;
    addToolUseCard(toolName, toolInput);
    return;
  }
  if (chunk._qoder_type === 'tool_result') {
    const toolId = chunk._qoder_tool_id || '';
    const isError = chunk._qoder_is_error || false;
    const resContent = delta.content || '';
    addToolResultCard(toolId, resContent, isError);
    return;
  }
  if (chunk._qoder_type === 'error') {
    const qoderErr = chunk._qoder_error || {};
    const statusCode = qoderErr.status_code || 0;
    const code = qoderErr.code || 'unknown';
    const message = qoderErr.message || 'Unknown upstream error';
    let hint = '';
    if (statusCode === 403 || statusCode === 402 || code === 'forbidden' || code === 'payment_required' || code === '112') {
      hint = '\n\n这是 QoderWork 账户订阅问题（FORBIDDEN code 112）。\n免费模型 qmodel_latest 也需要有效订阅才能使用。\n请访问 https://qoder.com/pricing 检查账户套餐。';
    }
    addErrorBubble(`[上游错误 ${statusCode} ${code}] ${message}${hint}`);
    return;
  }

  // Regular content
  if (delta.content) {
    appendContent(delta.content);
  }

  if (choice.finish_reason) {
    finishThinking();
  }
}

function appendThinking(text) {
  if (!currentThinkingEl) {
    const { sec, header, body } = createThinkingSection(currentAssistantEl);
    currentThinkingEl = { sec, header, body };
  }
  thinkingText += text;
  currentThinkingEl.body.textContent = thinkingText;
  if (!thinkingOpen) {
    currentThinkingEl.body.classList.add('open');
    currentThinkingEl.header.querySelector('.thinking-arrow').classList.add('open');
    thinkingOpen = true;
  }
  scrollToBottom();
}

function finishThinking() {
  if (currentThinkingEl) {
    const spinner = currentThinkingEl.header.querySelector('.thinking-spinner');
    if (spinner) spinner.remove();
    const label = currentThinkingEl.header.querySelector('.thinking-label');
    if (label) label.textContent = 'Thinking';
    if (thinkingOpen) {
      currentThinkingEl.body.classList.remove('open');
      currentThinkingEl.header.querySelector('.thinking-arrow').classList.remove('open');
      thinkingOpen = false;
    }
    currentThinkingEl = null;
  }
}

function appendContent(text) {
  if (!currentContentEl) {
    finishThinking();
    currentContentEl = document.createElement('div');
    currentContentEl.className = 'msg-content';
    currentAssistantEl.appendChild(currentContentEl);
  }
  contentText += text;
  currentContentEl.innerHTML = renderMarkdown(contentText);
  const lastEl = currentContentEl.lastElementChild || currentContentEl;
  if (!lastEl.querySelector('.streaming-cursor')) {
    const cursor = document.createElement('span');
    cursor.className = 'streaming-cursor';
    lastEl.appendChild(cursor);
  }
  scrollToBottom();
}

function addToolUseCard(toolName, toolInput) {
  finishThinking();
  const card = document.createElement('div');
  card.className = 'workflow-tooluse-card';
  const header = document.createElement('div');
  header.className = 'workflow-tooluse-header';
  header.innerHTML = '<span>&#128295;</span> ' + escapeHtml(toolName);
  card.appendChild(header);
  if (toolInput) {
    const inputDiv = document.createElement('div');
    inputDiv.className = 'workflow-tooluse-input';
    if (typeof toolInput === 'object') {
      inputDiv.textContent = JSON.stringify(toolInput, null, 2);
    } else {
      inputDiv.textContent = String(toolInput);
    }
    card.appendChild(inputDiv);
  }
  currentAssistantEl.appendChild(card);
  scrollToBottom();
}

function addToolResultCard(toolId, content, isError) {
  finishThinking();
  const card = document.createElement('div');
  card.className = 'workflow-toolresult-card';
  const header = document.createElement('div');
  header.className = 'workflow-toolresult-header';
  const arrow = document.createElement('span');
  arrow.className = 'workflow-toolresult-arrow';
  arrow.textContent = '\u25B6';
  const label = document.createElement('span');
  label.textContent = isError ? 'Tool Result (error)' : 'Tool Result';
  if (isError) label.className = 'workflow-toolresult-error';
  header.appendChild(arrow);
  header.appendChild(label);
  card.appendChild(header);
  const body = document.createElement('div');
  body.className = 'workflow-toolresult-body';
  body.textContent = content || '(no output)';
  card.appendChild(body);
  header.addEventListener('click', () => {
    const isOpen = body.classList.toggle('open');
    arrow.classList.toggle('open', isOpen);
  });
  currentAssistantEl.appendChild(card);
  scrollToBottom();
}

async function nonStreamChat(body, headers) {
  const res = await fetch(`${API_BASE}/v1/chat/completions`, {
    method: 'POST',
    headers,
    body: JSON.stringify(body),
    signal: abortController.signal,
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: { message: res.statusText } }));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const content = data.choices?.[0]?.message?.content || '';
  if (content) {
    appendContent(content);
  }
  chatMessages.push({ role: 'assistant', content });
}

function finishStreaming() {
  isStreaming = false;
  btnSend.style.display = '';
  btnStop.style.display = 'none';
  abortController = null;

  // Remove cursor
  if (currentContentEl) {
    const cursors = currentContentEl.querySelectorAll('.streaming-cursor');
    cursors.forEach(c => c.remove());
  }

  // Save assistant message to chat state and session
  if (contentText) {
    chatMessages.push({ role: 'assistant', content: contentText });

    // Save to session on server
    if (currentSessionId) {
      fetch(`${API_BASE}/api/sessions/${currentSessionId}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ role: 'assistant', content: contentText }),
      }).then(() => {
        // Refresh session list to update title/message count
        refreshSessionList();
      });
    }
  }

  currentAssistantEl = null;
  currentThinkingEl = null;
  currentContentEl = null;
  contentText = '';
  thinkingText = '';
}

async function refreshSessionList() {
  try {
    const res = await fetch(`${API_BASE}/api/sessions`);
    if (!res.ok) return;
    const data = await res.json();
    sessionList = data.sessions || [];
    renderSessionList();
  } catch {}
}

function stopStreaming() {
  if (abortController) {
    abortController.abort();
  }
}

function addErrorBubble(msg) {
  const div = document.createElement('div');
  div.className = 'msg msg-error';
  div.textContent = 'Error: ' + msg;
  messagesEl.appendChild(div);
  scrollToBottom();
}

// ==================== Markdown Renderer ====================
function renderMarkdown(text) {
  let html = escapeHtml(text);

  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code class="lang-${lang}">${code.trim()}</code></pre>`;
  });

  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  html = html.replace(/^[\-\*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
  html = html.replace(/\n/g, '<br>');
  html = html.replace(/<pre>([\s\S]*?)<\/pre>/g, (match, inner) => {
    return '<pre>' + inner.replace(/<br>/g, '\n') + '</pre>';
  });

  return html;
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ==================== Logs ====================
function startLogsRefresh() {
  fetchLogs();
  logsRefreshTimer = setInterval(fetchLogs, 5000);
}

async function fetchLogs() {
  try {
    const res = await fetch(`${API_BASE}/api/logs?limit=50`);
    if (!res.ok) return;
    const data = await res.json();
    const logs = data.items || data;
    renderLogs(logs);
  } catch {}
}

function renderLogs(logs) {
  if (!logs || !logs.length) {
    logsBody.innerHTML = '<div class="empty-state"><span>No logs yet</span></div>';
    return;
  }

  logsBody.innerHTML = '';
  logs.forEach(log => {
    const entry = document.createElement('div');
    entry.className = 'log-entry';

    const ts = log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : '--';
    const model = log.request?.model || log.model || '--';
    const status = log.status || 'ok';
    const duration = log.duration ? `${(log.duration / 1000).toFixed(1)}s` : '--';
    const preview = log.response?.contentLength
      ? `${log.response.contentLength} chars`
      : (log.preview || log.content || '--');

    entry.innerHTML = `
      <div class="log-meta">
        <span class="log-model">${escapeHtml(model)}</span>
        <span>${ts} &middot; ${duration} <span class="log-status ${status === 'error' ? 'err' : 'ok'}">${status}</span></span>
      </div>
      <div class="log-preview">${escapeHtml(String(preview).substring(0, 100))}</div>
      <div class="log-detail" id="log-detail-${log.id || ''}">
        <pre>Loading...</pre>
      </div>
    `;

    entry.addEventListener('click', async () => {
      const detail = entry.querySelector('.log-detail');
      if (detail.classList.contains('open')) {
        detail.classList.remove('open');
        return;
      }
      if (detail.querySelector('pre').textContent === 'Loading...') {
        try {
          const res = await fetch(`${API_BASE}/api/logs/${log.id}`);
          if (res.ok) {
            const fullLog = await res.json();
            detail.querySelector('pre').textContent = JSON.stringify(fullLog, null, 2);
          }
        } catch {}
      }
      detail.classList.add('open');
    });

    logsBody.appendChild(entry);
  });
}

async function clearLogs() {
  try {
    await fetch(`${API_BASE}/api/logs`, { method: 'DELETE' });
    fetchLogs();
  } catch {}
}

// ==================== Start ====================
init();
</script>
